/* ============ 讲解文稿（逐句，供语音+字幕） ============ */
const SENT = [
 "同学们好！我是晓晓老师，懒脑袋锻炼计划第10课开讲啦。",
 "先复习上节课：我们讲了消费的两副面孔——同一拨人一边抠门、一边大方。",
 "它的真名字叫清醒消费：该省省、该花花，标准是「值等于好等于我开心」。",
 "口诀还记得吗？临期限量抠着花，兴趣体验大方花；省的是那虚面子，买的是我真牵挂。",
 "为什么要复习？因为这节课的「全职儿女」，和上节课是同一棵藤上结的瓜——都在省钱、都在依赖家庭。",
 "好，复习完毕，我们进入今天的新现象。",

 "最近有个词特别火，叫「全职儿女」。",
 "什么意思？就是二十到三十五岁的年轻人，大学毕业后不找工作、不考研、不结婚，回到家里。",
 "每天做做家务、陪陪父母、刷刷手机、打打游戏，管这叫「全职儿女」。",
 "他们吃住都在父母家，有的不向父母要钱，靠父母给的零花钱过日子。",
 "有的更正规——每月从父母那儿领三千到五千块的「家庭工资」，美其名曰用劳动换生活。",
 "数据吓人：智联招聘二零二六年说，全国全职儿女已经超过三百八十万，大多是本科以上，集中在二十五到三十岁。",
 "社科院更狠：十八到三十五岁青年里，百分之十一点六处于既不上班也不深造的蛰伏状态，总人数突破一千万。",
 "豆瓣上全职儿女工作交流中心小组，已经聚了四千多人，他们自称打工人——雇主是父母，工作内容是做饭、打扫、陪聊、跑腿。",

 "先正名！一看到在家不工作，很多人第一反应是：这不就是啃老吗？",
 "先别急着骂。二十一世纪教育研究院的熊丙奇院长，说了句大实话。",
 "啃老是什么都不干靠父母养；全职儿女，相当于父母把请保姆的钱，花在了孩子身上。",
 "你看，这不是白吃白喝，而是一份没有五险一金的家政合同——你干活，父母发工资。",
 "不过光看到这一层还太浅。全职儿女其实分三种完全不同的形态，背后是三种不同的人生。",

 "第一种，过渡缓冲型，占百分之六十二点三，是大多数。",
 "他们平均在家六到十八个月，百分之八十九点七有明确重返职场的计划——说白了先喘口气、缓一缓，等机会好了再出去。",
 "第二种，家庭照料型，占百分之二十三点五。多半是父母生病需要人照顾，子女用劳动，替代了每月五六千块的护工费。",
 "第三种，主动选择型，占百分之十四点二。高学历、厌倦了职场内卷，主动回归家庭，追求自己的生活节奏。",
 "你看，同一个词，背后是三种人生：暂时歇脚、照顾双亲、主动逃离内卷。所以别一刀切叫人啃老。",

 "那这股风从哪刮起来的？五根线，记好。",
 "第一根：就业冷。二零二六年毕业生预计一千二百七十万，十六到二十四岁失业率一度高达百分之十六点五——六个年轻人里就有一个找不到工作。",
 "起薪普遍四五千，一二线城市扣掉房租通勤所剩无几；企业还卡三十五岁以下、接受加班；人工智能又在抢基础文员、客服的活。",
 "第二根：生活贵。房租、通勤、吃饭三座大山，把刚毕业的工资吃得干干净净，努力多年看不到希望。",
 "第三根：家底暖。中国社会讲究家庭兜底——百分之六十七的六十岁以上老人在资助成年子女，百分之七十六的八零九零后买房靠父母。",
 "城市家庭里超过百分之六十五存在老养小——父母退休金养着成年孩子，家成了最后的避风港。",
 "第四根：观念变。这代人不再迷信必须上班才算有出息。华东师大吕新雨教授说得好：父母陪我们长大，我们陪父母变老，这样的陪伴本身就有意义。",
 "第五根：节奏喘。社会太快了，人人被推着跑，回家等于给自己按了个暂停键。",

 "不过老师要泼冷水，几个坑必须警惕。",
 "第一坑：角色固化。全职儿女当得越久，重返职场可能性越低。居家三年再求职，竞争力平均下降百分之四十——技能退化、社交退化、意志磨平。",
 "第二坑：习得性无助。北大心理团队十年追踪发现，被包办长大的孩子，自主决策的肌肉会退化，久而久之连自己做决定都不敢。",
 "第三坑：别学日本。日本九十年代泡沫破了之后，出现一百四十六万蛰居族，还有更惨的八零五零问题——八十岁的父母养着五十岁的孩子，父母一走，孩子连饭都不会做。",
 "第四坑：阶层双标。同一件事，穷人叫啃老，中产叫托底，富人叫传承——同一种给予，穷人背骂名，富人获赞美，这才最荒诞。",
 "还有，别光看孩子，父母也在搭进去：百分之三十二的老人因此推迟了养老储蓄，百分之十八的家庭甚至因此负债。",

 "来，背口诀！正名口诀：不是懒，是缓冲；不是啃，是合同；三种形，莫混淆。",
 "三形态口诀：过渡六成暂歇脚，照料两成护双亲，主动一成图自在。",
 "五根线口诀：一冷二贵三家暖，四变五喘说得清。就业遇冷岗难寻，家底托底暖人心，观念一变送陪伴，加速社会按暂停。",
 "反方口诀：久当固化失力气，莫学日本八零五零；双标荒诞莫较真，父母养老要心疼。",

 "好，现在轮到你当老师了。用一句话说说全职儿女是什么？再想想它和上节课消费两副面孔的共同点；最后，假如你是父母，会怎么跟在家缓冲的孩子定一份合同？",
 "（停顿，给学生思考时间——想好了再往下听答案。）",

 "今天的课到这儿。记住：全职儿女不是非黑即白的啃老，它是一代人在风暴里抓住的一块浮木。",
 "浮木能救命，但不能当船开——缓冲可以，停泊不行。下节课我们继续拆解新现象。作业：今晚跟爸妈聊五分钟，问问他们当年二十多岁在干嘛。同学们，再见！"
];

/* ============ 语音 + 播放控制 ============ */
const seek=document.getElementById('seek');
const pos=document.getElementById('pos');
const now=document.getElementById('now');
const meta=document.getElementById('meta');
const liveDot=document.getElementById('liveDot');
const playBtn=document.getElementById('playBtn');
const prevBtn=document.getElementById('prevBtn');
const nextBtn=document.getElementById('nextBtn');
const toast=document.getElementById('toast');

const N=SENT.length;
seek.max=N-1; pos.textContent='0 / '+N;
let cur=0, playing=false, autoplay=true, quizOpen=false;
let voice=null, utter=null;

function loadVoices(){
  const vs = window.speechSynthesis ? speechSynthesis.getVoices() : [];
  voice = vs.find(v=>/Xiaoxiao|晓晓| Xiao Xiao/i.test(v.name))
        || vs.find(v=>v.lang==='zh-CN' && /female|女|Neural/i.test(v.name))
        || vs.find(v=>v.lang && v.lang.toLowerCase().startsWith('zh'))
        || null;
}
if(window.speechSynthesis){
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}

function stopSpeech(){ if(window.speechSynthesis) speechSynthesis.cancel(); }

function speak(i){
  if(!window.speechSynthesis) return;
  stopSpeech();
  const u=new SpeechSynthesisUtterance(SENT[i]);
  if(voice) u.voice=voice;
  u.lang='zh-CN'; u.rate=0.98; u.pitch=1.0; u.volume=1.0;
  u.onend=()=>{
    if(quizOpen) return;
    if(autoplay && playing && cur < N-1){
      go(cur+1, true);
    }
  };
  utter=u; speechSynthesis.speak(u);
}

function highlight(i){
  lineEls.forEach((el,idx)=>{ if(el) el.classList.toggle('cur', idx===i); });
  const el=lineEls[i];
  if(el){ el.scrollIntoView({behavior:'smooth',block:'center'}); }
  now.innerHTML = '<span class="who"></span>'+SENT[i];
  seek.value=i; pos.textContent=(i+1)+' / '+N;
}

function maybeBubble(i){
  const b=BUBBLES[i];
  if(b){
    toast.innerHTML='<span class="nm">'+b.nm+'：</span>'+b.txt;
    toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'),4200);
  }
}

function maybeQuiz(i){
  const q=QUIZZES[i];
  if(q){ openQuiz(i,q); return true; }
  return false;
}

function go(i, fromEnd){
  i=Math.max(0,Math.min(N-1,i));
  cur=i;
  highlight(i);
  maybeBubble(i);
  if(maybeQuiz(i)){
    stopSpeech(); playing=false; updatePlayBtn();
    return;
  }
  if(playing){ speak(i); }
}

function updatePlayBtn(){ playBtn.textContent = playing? '⏸ 暂停':'▶ 播放'; liveDot.style.display = playing? 'inline-block':'none'; }

playBtn.onclick=()=>{
  if(quizOpen) return;
  if(playing){ playing=false; stopSpeech(); updatePlayBtn(); meta.textContent='已暂停'; }
  else{
    if(cur>=N-1) cur=0;
    playing=true; autoplay=true; updatePlayBtn(); meta.textContent='晓晓老师正在朗读…';
    if(maybeQuiz(cur)){ playing=false; updatePlayBtn(); return; }
    speak(cur);
  }
};
prevBtn.onclick=()=>{ if(quizOpen)return; playing=false; updatePlayBtn(); go(cur-1); };
nextBtn.onclick=()=>{ if(quizOpen)return; playing=false; updatePlayBtn(); go(cur+1); };
seek.oninput=()=>{ if(quizOpen)return; const v=parseInt(seek.value,10); playing=false; updatePlayBtn(); go(v); };

/* ============ 费曼弹题 ============ */
const mask=document.getElementById('mask');
const quizBox=document.getElementById('quizBox');
function openQuiz(i,q){
  quizOpen=true; autoplay=false; playing=false; updatePlayBtn();
  meta.textContent='⏸ 突袭提问中，请先作答';
  let html='<h3>'+q.title+'</h3>';
  html+='<span class="asker">'+q.asker+' 问</span>';
  html+='<div class="q" style="background:#2a1620;border-color:#ff6b9d">'+q.intro+'</div>';
  q.qs.forEach((qq,k)=>{
    html+='<div class="q"><span class="lab">'+qq.lab+'</span>'+qq.q+'</div>';
    html+='<textarea id="ta'+i+'_'+k+'" placeholder="在这里用你自己的话写答案…"></textarea>';
  });
  html+='<div class="ans" id="ans'+i+'">'+q.ans+'</div>';
  html+='<div class="row">';
  html+='<button class="btn primary" id="reveal'+i+'">提交看答案</button>';
  html+='<button class="btn nav" id="cont'+i+'">继续上课 ⏭</button>';
  html+='</div>';
  quizBox.innerHTML=html;
  mask.classList.add('show');
  document.getElementById('reveal'+i).onclick=()=>{ document.getElementById('ans'+i).style.display='block'; };
  document.getElementById('cont'+i).onclick=()=>{ closeQuiz(i); };
}
function closeQuiz(i){
  mask.classList.remove('show'); quizOpen=false;
  if(cur < N-1){ cur=i; playing=true; autoplay=true; updatePlayBtn(); meta.textContent='晓晓老师继续朗读…'; go(i+1); }
  else { meta.textContent='本课已讲完 🎉'; }
}
window.addEventListener('click',e=>{ if(e.target===mask) { /* 点遮罩不关闭，需作答 */ } });

/* 初始 */
highlight(0);
meta.textContent='已就绪 · 本课前半段复习「消费两副面孔」，再讲新课';
