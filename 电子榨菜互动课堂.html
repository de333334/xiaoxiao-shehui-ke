<script>
/* ============ 讲解文稿（逐句，供语音+字幕） ============ */
const SENT = [
 "同学们好！我是晓晓老师，懒脑袋锻炼计划第17课开讲啦。",
 "先复习上节课：我们讲了年轻人为什么争当淡人——把情绪调成低功耗模式，不内耗、能自保、还真实。",
 "它和断亲潮（社交省电）、玄学热（抓确定）、养生（护精力）、谷子经济（人际淡自我浓）、公园20分钟（免费治愈）、反向旅游（空间逃离）是同一棵树的近亲。",
 "今天这课，我们接着讲年轻人的一个人生活：当一个人吃饭时，屏幕成了饭桌上的第三个人——这股风叫电子榨菜。",
 "说白了：一个人吃饭，手机往筷子边一搁，没这下饭视频就觉得饭少一半味儿，主打一个借别人的热闹下自己的饭。",
 "好，复习完毕，进入今天的饭桌搭子。",

 "先说现象：什么是电子榨菜？就是吃饭时搭配的数字内容——短视频、剧综切片、吃播、直播，屏幕一响，碗里的白饭都能多扒两口。",
 "它有多普遍？湖南日报一份大学生调研回收386份问卷，超过七成学生吃饭会习惯性开视频下饭；18.28%几乎餐餐都吃，也有人坚持吃饭不看屏。",
 "QuestMobile的报告更狠：2025年用户日均电子榨菜消费时长78分钟，主要是短视频占62%、播客23%、ASMR助眠音15%。",
 "00后还发明了电子榨菜盲盒——随机点开一部剧，3分钟内决定下饭不下饭；还有下饭剧鄙视链：青铜《甄嬛传》《武林外传》，黄金《风味人间》，王者《种地吧》。",
 "某视频平台午间12到14点的播放峰值里，78%的用户都在边吃边看——电子榨菜，已经成了这届年轻人的隐形餐具。",
 "所以电子榨菜不是个别怪癖，是数字时代最典型的一人食生活方式切片：一个人，也能吃得很热闹。",

 "先正名！一看到一个人吃饭还要刷手机，很多人第一反应：这是孤独、社恐、不会和人打交道。",
 "先别急着贴标签。电子榨菜真不等于孤独病态——它更像一个赛博饭搭子：不抢菜、不催婚、不问工资，情绪稳定得感人。",
 "记住一句话：电子榨菜，是把一个人吃饭的空填上借来的热闹；是在效率暴政里，给吃饭这半小时抢回一点只属于自己的快乐。",
 "所以别再说刷手机吃饭是浪费——只要不本末倒置，它是成年人难得的过家家：一个人也把日子过得有声有色。",
 "真正的危险不是看视频吃饭，是看着看着，把屏幕里的热闹当成了唯一的陪伴，把真实的关系淡成了背景音。",

 "要真懂电子榨菜，先抓三个核心概念。",
 "第一个：虚拟陪伴代偿。心理学叫陪伴缺失补偿——屏幕里的热闹暂时缓解独处焦虑，一个人吃饭也不慌，像饭桌边坐了个老朋友。",
 "第二个：碎片仪式感。996下平均用餐才27分钟，电子榨菜是压缩式娱乐的最优解；63%的人吃饭二刷熟剧而非追新，要的不是跌宕，是无需动脑的安全感。",
 "第三个：注意力填充。吃饭本是最容易走神发呆的碎片时间，塞一段内容进去，既打发了无聊、又快速拿到多巴胺——这顿饭的卡路里是零，占的时间和注意力却一点不少。",
 "记住这三词：借热闹（虚拟陪伴）、抢安全（仪式感）、填空白（注意力）。后面全靠它们串。",

 "那这股风从哪刮起来的？五根线，记好。",
 "第一根：独居一人食爆发。单身经济从三千多亿干到近万亿，独居青年越来越多，一个人吃饭成了日常，饭桌自然缺个搭子。",
 "第二根：效率暴政挤占。工作节奏快、通勤长，吃饭被当成必须高效利用的碎片时间，电子榨菜把吃饭顺手变成娱乐，一举两得。",
 "第三根：内容平台赋能。短视频、切片、吃播海量且免费，随手点开就有，比约人吃饭成本低太多——这是它取代真人搭子的关键。",
 "第四根：社交降噪省电。和咱们讲过的搭子、淡人同款：真人饭局要寒暄、要埋单、要接话，电子榨菜零社交成本，想吃就吃、想停就停。",
 "第五根：算法投喂加码。平台越推越懂你，搞笑推搞笑、治愈推治愈，电子榨菜盲盒越刷越上头，把临时陪伴养成日常刚需。",
 "五根线合起来：一个人住缺搭子，时间碎了要填缝，屏幕免费又省电，算法还来添把火——饭桌上的第三个人，就这么坐下了。",

 "不过老师要泼冷水，几个坑必须警惕。",
 "第一坑：本末倒置。变成好好刷视频、顺便吃饭，为配饭专门建收藏夹，饭吃没吃进去都不记得，营养和健康都让步给屏幕。",
 "第二坑：虚假陪伴。屏幕里的热闹是借来的，视频一断饭就难以下咽，安静得发慌——它填了空，却可能让你更不想经营真关系，越刷越孤。",
 "第三坑：信息茧房。你越爱看轻松，算法越推轻松，久而久之失去深度思考的耐力，脑袋被榨菜腌成了不用动脑的口味。",
 "第四坑：肠胃代偿。医学研究证实，边看屏幕边进食容易过量摄入、消化变慢——赛博代吃爽了嘴，累了胃。",
 "所以电子榨菜是调味品，不是主食；是下饭的榨菜，不是人生的搭子。",

 "来，背口诀！正名口诀：电子榨菜非孤僻，赛博搭子情绪稳；借来热闹下自己的饭，半小时快乐属于己。",
 "三概念口诀：虚拟陪伴代偿空，碎片仪式抢安全；注意力填空白处，零卡占满时间和眼。",
 "五根线口诀：一独居二效率，三平台四省电；算法助推第五根，饭桌第三人坐得稳。",
 "反方口诀：本末倒置饭白吃，虚假陪伴越刷孤；茧房腌坏思考力，肠胃代偿要当心。",

 "下面练练读数的眼睛，三道数据题，一步步算。",

 "好，现在轮到你当老师了。用一句话说说电子榨菜是什么、为什么火；再想想它和搭子文化、淡人、断亲潮的共同点；最后，给你一个自己吃饭的场景，写写你的下饭搭子怎么配才健康。",
 "（停顿，给学生思考时间——想好了再往下听答案。）",

 "今天的课到这儿。记住：电子榨菜，表面是吃饭刷手机，里子是在一个人住、时间碎、社交累的时候，想抓住一点不贵、不累、还热闹的陪伴。",
 "它和断亲潮（一个人）、搭子文化（饭桌搭子变赛博搭子）、淡人（低能耗陪伴）、谷子（情绪消费）、玄学热（抓确定）、公园20分钟（免费治愈）是同一棵树的近亲——都在高压和不确定里，给自己找一块买得起的、能喘口气的小角落。",
 "下节课我们继续拆解新现象。作业：今天一个人吃饭时，挑一段真正让你放松的榨菜，但定个时——吃完就关，把剩下的时间留给真实的自己。同学们，再见！"
];

/* ============ 语音 + 播放控制 ============ */
const seek=document.getElementById('seek');
const pos=document.getElementById('pos');
const now=document.getElementById('now');
const meta=document.getElementById('meta');
const liveDot=document.getElementById('liveDot');
const playBtn=document.getElementById('playBtn');
const prevBtn=document.getElementById('prevBtn');
const nextBtn=document.getElementById('nextBtn');
const toast=document.getElementById('toast');

const N=SENT.length;
seek.max=N-1; pos.textContent='0 / '+N;
let cur=0, playing=false, autoplay=true, quizOpen=false;
let voice=null, utter=null;

function loadVoices(){
  const vs = window.speechSynthesis ? speechSynthesis.getVoices() : [];
  voice = vs.find(v=>/Xiaoxiao|晓晓| Xiao Xiao/i.test(v.name))
        || vs.find(v=>v.lang==='zh-CN' && /female|女|Neural/i.test(v.name))
        || vs.find(v=>v.lang && v.lang.toLowerCase().startsWith('zh'))
        || null;
}
if(window.speechSynthesis){
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}

function stopSpeech(){ if(window.speechSynthesis) speechSynthesis.cancel(); }

function speak(i){
  if(!window.speechSynthesis) return;
  stopSpeech();
  const u=new SpeechSynthesisUtterance(SENT[i]);
  if(voice) u.voice=voice;
  u.lang='zh-CN'; u.rate=0.98; u.pitch=1.0; u.volume=1.0;
  u.onend=()=>{
    if(quizOpen) return;
    if(autoplay && playing && cur < N-1){
      go(cur+1, true);
    }
  };
  utter=u; speechSynthesis.speak(u);
}

function highlight(i){
  lineEls.forEach((el,idx)=>{ if(el) el.classList.toggle('cur', idx===i); });
  const el=lineEls[i];
  if(el){ el.scrollIntoView({behavior:'smooth',block:'center'}); }
  now.innerHTML = '<span class="who"></span>'+SENT[i];
  seek.value=i; pos.textContent=(i+1)+' / '+N;
}

function maybeBubble(i){
  const b=BUBBLES[i];
  if(b){
    toast.innerHTML='<span class="nm">'+b.nm+'：</span>'+b.txt;
    toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'),4200);
  }
}

function maybeQuiz(i){
  const q=QUIZZES[i];
  if(q){ openQuiz(i,q); return true; }
  return false;
}

function go(i, fromEnd){
  i=Math.max(0,Math.min(N-1,i));
  cur=i;
  highlight(i);
  maybeBubble(i);
  if(maybeQuiz(i)){
    stopSpeech(); playing=false; updatePlayBtn();
    return;
  }
  if(playing){ speak(i); }
}

function updatePlayBtn(){ playBtn.textContent = playing? '⏸ 暂停':'▶ 播放'; liveDot.style.display = playing? 'inline-block':'none'; }

playBtn.onclick=()=>{
  if(quizOpen) return;
  if(playing){ playing=false; stopSpeech(); updatePlayBtn(); meta.textContent='已暂停'; }
  else{
    if(cur>=N-1) cur=0;
    playing=true; autoplay=true; updatePlayBtn(); meta.textContent='晓晓老师正在朗读…';
    if(maybeQuiz(cur)){ playing=false; updatePlayBtn(); return; }
    speak(cur);
  }
};
prevBtn.onclick=()=>{ if(quizOpen)return; playing=false; updatePlayBtn(); go(cur-1); };
nextBtn.onclick=()=>{ if(quizOpen)return; playing=false; updatePlayBtn(); go(cur+1); };
seek.oninput=()=>{ if(quizOpen)return; const v=parseInt(seek.value,10); playing=false; updatePlayBtn(); go(v); };

/* ============ 费曼弹题 ============ */
const mask=document.getElementById('mask');
const quizBox=document.getElementById('quizBox');
function openQuiz(i,q){
  quizOpen=true; autoplay=false; playing=false; updatePlayBtn();
  meta.textContent='⏸ 突袭提问中，请先作答';
  let html='<h3>'+q.title+'</h3>';
  html+='<span class="asker">'+q.asker+' 问</span>';
  html+='<div class="q" style="background:#2a1620;border-color:#ff6b9d">'+q.intro+'</div>';
  q.qs.forEach((qq,k)=>{
    html+='<div class="q"><span class="lab">'+qq.lab+'</span>'+qq.q+'</div>';
    html+='<textarea id="ta'+i+'_'+k+'" placeholder="在这里用你自己的话写答案…"></textarea>';
  });
  html+='<div class="ans" id="ans'+i+'">'+q.ans+'</div>';
  html+='<div class="row">';
  html+='<button class="btn primary" id="reveal'+i+'">提交看答案</button>';
  html+='<button class="btn nav" id="cont'+i+'">继续上课 ⏭</button>';
  html+='</div>';
  quizBox.innerHTML=html;
  mask.classList.add('show');
  document.getElementById('reveal'+i).onclick=()=>{ document.getElementById('ans'+i).style.display='block'; };
  document.getElementById('cont'+i).onclick=()=>{ closeQuiz(i); };
}
function closeQuiz(i){
  mask.classList.remove('show'); quizOpen=false;
  if(cur < N-1){ cur=i; playing=true; autoplay=true; updatePlayBtn(); meta.textContent='晓晓老师继续朗读…'; go(i+1); }
  else { meta.textContent='本课已讲完 🎉'; }
}
