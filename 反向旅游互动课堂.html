const SENT = [
 "同学们好！我是晓晓老师，懒脑袋锻炼计划第15课开讲啦。",
 "先复习上节课：我们讲了年轻人为什么爱上公园20分钟效应——在草地上坐20分钟，给紧绷的神经按暂停键，抓一种不花一分钱的精神快充。",
 "它和玄学热、人机恋、养生、谷子经济是同一棵树的亲兄弟：玄学去庙里抓确定，人机恋去手机里抓回应，养生去身体里抓掌控，谷子去消费里抓情绪价值，公园去自然里抓免费喘息。",
 "今天这课，我们讲第六块拼图：年轻人为什么抛弃人挤人的网红景区，掉头涌向小县城——这股风叫反向旅游。",
 "说白了就是：不挤、不贵、有特色、还能治愈，年轻人用脚投票，重新定义了什么叫出去玩。",
 "好，复习完毕，进入今天的新现象。",

 "先说现象：什么是反向旅游？它也叫县域旅游、小城旅游。",
 "意思是：避开人山人海的一二线城市和老牌5A景区，改去那些名声不大、流量很小的县城、乡村、小地方，安安静静地深度体验。",
 "这股风2026年彻底火了：今年五一，县域目的地的旅游产品预订量，比去年同期暴涨了128%（同程旅行《2026五一旅行趋势报告》）。",
 "更反直觉的是：全国最火的50个5A级景区，2023到2025年国庆游客量连续3年下降，加起来少了约13%（文旅部技术创新中心监测）。",
 "与此同时，2025年前三季度，省内游占了全部国内游的73.4%（中国旅游研究院报告）——大家不出远门、就在家附近玩，近程化、本地化成主流。",
 "所以今天的问题不是年轻人还旅不旅游，而是：为什么他们宁去小县城，也不去大城市网红打卡了？",

 "先正名！一看到年轻人跑去小县城，很多人第一反应是：穷游嘛，玩不起大城市呗。",
 "先别急着下结论。反向旅游真不是没钱才去，而是一场主动选择。",
 "他们要的是四个词：不挤、不贵、有特色、能治愈。比起在网红景区排5小时队、逛10分钟，小县城是另一种松弛。",
 "记住一句话：反向旅游不是逃避，是用脚投票，把旅行的定义从我去过改成我体验过。",
 "所以别再说小县城low——它可能是这届年轻人最清醒的出行答案。",

 "要真懂反向旅游，先抓三个核心概念。",
 "第一个：情绪价值优先。马蜂窝说，年轻游客的目标正从一座城缩小到一家小吃店——体验感取代目的地，成了出门的第一理由。从看风景变成过生活。",
 "第二个：性价比理性。携程数据显示，五一县域酒店均价，只有一二线热门城市的一半。该省省、该花花，和咱们讲过的消费两副面孔是同一套清醒逻辑。",
 "第三个：在地沉浸。小县城没被过度商业化包装，保留着原汁原味的本地生活，年轻人跑去像本地人一样住几天，而不只是举着手机拍个照就走。",
 "记住这三词：重情绪（心价比）、讲性价比（该省省）、沉浸本地（过生活）。后面全靠它们串。",

 "那这股风从哪刮起来的？五根线，记好。",
 "第一根：人挤人疲惫。热门景区排队5小时、游览10分钟，古镇千城一面、卖的纪念品都一样，年轻人厌倦了当流水线上的观光零件。",
 "第二根：钱包理性。县城酒店只要大城市一半价，同样的钱能住更好、玩更久；理性消费让他们把钱花在刀刃上。",
 "第三根：情绪升级。年轻人从打卡转向充电，要的是松弛感、文化认同、情感代偿——我国67%的城镇化率，催生了大量县城出走青年，旅游成了重温乡土记忆的出口。",
 "第四根：算法与社媒助推。小红书、抖音把平潭蓝眼泪、安吉采春茶这些冷门小城，直接推到你眼前，信息平权让宝藏小城被看见。",
 "第五根：基建兜底。高铁网、高速公路、村村通四通八达，城乡之间来去自如，小城才可游、可居、可体验。",
 "五根线合起来：人挤怕了要逃，钱包要算计，情绪要升级，社媒推一把，基建送到脚边。",

 "不过老师要泼冷水，几个坑必须警惕。",
 "第一坑：小城接不住。流量突然暴涨，交通接驳、停车位、卫生、临时涨价甚至宰客都可能跟不上——这是甜蜜的烦恼。",
 "第二坑：千城一面。不少地方盲目复制古镇加小吃加文创的老套路，创新不足，游客去了发现还是那一套，照样失望。",
 "第三坑：反向成内卷。警惕反向变新内卷——大家都涌去小城，小城又挤了，等于换了个地方排队。",
 "第四坑：标签陷阱。别把去过当成活过——体验不等于换个地方拍照打卡，身在曹营心在写字楼，白去。",
 "所以反向旅游是信号灯，不是万能药。能去就去，但别神化，更别跟风。",

 "来，背口诀！正名口诀：不是穷游玩不起，是人从众里没自己；不挤不贵有特色，用脚投票选小城。",
 "三概念口诀：情绪价值排第一，性价比里藏着理；在地沉浸过生活，不是看景是活过。",
 "五根线口诀：一逃人海二省钱，三升情绪四推演；基建兜底路路通，小城逆袭正当年。",
 "反方口诀：小城接不住要防，千城一面莫效仿；反向也会成内卷，体验莫当打卡换。",

 "下面练练读数的眼睛，三道数据题，一步步算。",

 "好，现在轮到你当老师了。用一句话说说年轻人为什么涌向小县城；再想想它和公园20分钟、消费两副面孔、谷子经济的共同点；最后，假如给你一个三天小长假，你会选哪种反向旅游？写个小计划。",
 "（停顿，给学生思考时间——想好了再往下听答案。）",

 "今天的课到这儿。记住：年轻人爱反向旅游，表面是去小县城玩，里子是在卷不动、贵不动的时候，想抓住一段不挤、不贵、能喘气、还真实的生活。",
 "它和公园20分钟（免费治愈）、消费两副面孔（该省省）、谷子经济（情绪价值）是同一棵树的近亲——都在高压和不确定里，给自己找一块能踩稳、还买得起的石头。",
 "下节课我们继续拆解新现象。作业：这个假期，试着规划一次反向旅游——挑个没去过的小城，不赶景点，只去体验一种当地生活。同学们，再见！"
];

/* ============ 语音 + 播放控制 ============ */
const seek=document.getElementById('seek');
const pos=document.getElementById('pos');
const now=document.getElementById('now');
const meta=document.getElementById('meta');
const liveDot=document.getElementById('liveDot');
const playBtn=document.getElementById('playBtn');
const prevBtn=document.getElementById('prevBtn');
const nextBtn=document.getElementById('nextBtn');
const toast=document.getElementById('toast');

const N=SENT.length;
seek.max=N-1; pos.textContent='0 / '+N;
let cur=0, playing=false, autoplay=true, quizOpen=false;
let voice=null, utter=null;

function loadVoices(){
  const vs = window.speechSynthesis ? speechSynthesis.getVoices() : [];
  voice = vs.find(v=>/Xiaoxiao|晓晓| Xiao Xiao/i.test(v.name))
        || vs.find(v=>v.lang==='zh-CN' && /female|女|Neural/i.test(v.name))
        || vs.find(v=>v.lang && v.lang.toLowerCase().startsWith('zh'))
        || null;
}
if(window.speechSynthesis){
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}

function stopSpeech(){ if(window.speechSynthesis) speechSynthesis.cancel(); }

function speak(i){
  if(!window.speechSynthesis) return;
  stopSpeech();
  const u=new SpeechSynthesisUtterance(SENT[i]);
  if(voice) u.voice=voice;
  u.lang='zh-CN'; u.rate=0.98; u.pitch=1.0; u.volume=1.0;
  u.onend=()=>{
    if(quizOpen) return;
    if(autoplay && playing && cur < N-1){
      go(cur+1, true);
    }
  };
  utter=u; speechSynthesis.speak(u);
}

function highlight(i){
  lineEls.forEach((el,idx)=>{ if(el) el.classList.toggle('cur', idx===i); });
  const el=lineEls[i];
  if(el){ el.scrollIntoView({behavior:'smooth',block:'center'}); }
  now.innerHTML = '<span class="who"></span>'+SENT[i];
  seek.value=i; pos.textContent=(i+1)+' / '+N;
}

function maybeBubble(i){
  const b=BUBBLES[i];
  if(b){
    toast.innerHTML='<span class="nm">'+b.nm+'：</span>'+b.txt;
    toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'),4200);
  }
}

function maybeQuiz(i){
  const q=QUIZZES[i];
  if(q){ openQuiz(i,q); return true; }
  return false;
}

function go(i, fromEnd){
  i=Math.max(0,Math.min(N-1,i));
  cur=i;
  highlight(i);
  maybeBubble(i);
  if(maybeQuiz(i)){
    stopSpeech(); playing=false; updatePlayBtn();
    return;
  }
  if(playing){ speak(i); }
}

function updatePlayBtn(){ playBtn.textContent = playing? '⏸ 暂停':'▶ 播放'; liveDot.style.display = playing? 'inline-block':'none'; }

playBtn.onclick=()=>{
  if(quizOpen) return;
  if(playing){ playing=false; stopSpeech(); updatePlayBtn(); meta.textContent='已暂停'; }
  else{
    if(cur>=N-1) cur=0;
    playing=true; autoplay=true; updatePlayBtn(); meta.textContent='晓晓老师正在朗读…';
    if(maybeQuiz(cur)){ playing=false; updatePlayBtn(); return; }
    speak(cur);
  }
};
prevBtn.onclick=()=>{ if(quizOpen)return; playing=false; updatePlayBtn(); go(cur-1); };
nextBtn.onclick=()=>{ if(quizOpen)return; playing=false; updatePlayBtn(); go(cur+1); };
seek.oninput=()=>{ if(quizOpen)return; const v=parseInt(seek.value,10); playing=false; updatePlayBtn(); go(v); };

/* ============ 费曼弹题 ============ */
const mask=document.getElementById('mask');
const quizBox=document.getElementById('quizBox');
function openQuiz(i,q){
  quizOpen=true; autoplay=false; playing=false; updatePlayBtn();
  meta.textContent='⏸ 突袭提问中，请先作答';
  let html='<h3>'+q.title+'</h3>';
  html+='<span class="asker">'+q.asker+' 问</span>';
  html+='<div class="q" style="background:#2a1620;border-color:#ff6b9d">'+q.intro+'</div>';
  q.qs.forEach((qq,k)=>{
    html+='<div class="q"><span class="lab">'+qq.lab+'</span>'+qq.q+'</div>';
    html+='<textarea id="ta'+i+'_'+k+'" placeholder="在这里用你自己的话写答案…"></textarea>';
  });
  html+='<div class="ans" id="ans'+i+'">'+q.ans+'</div>';
  html+='<div class="row">';
  html+='<button class="btn primary" id="reveal'+i+'">提交看答案</button>';
  html+='<button class="btn nav" id="cont'+i+'">继续上课 ⏭</button>';
  html+='</div>';
  quizBox.innerHTML=html;
  mask.classList.add('show');
  document.getElementById('reveal'+i).onclick=()=>{ document.getElementById('ans'+i).style.display='block'; };
  document.getElementById('cont'+i).onclick=()=>{ closeQuiz(i); };
}
function closeQuiz(i){
  mask.classList.remove('show'); quizOpen=false;
  if(cur < N-1){ cur=i; playing=true; autoplay=true; updatePlayBtn(); meta.textContent='晓晓老师继续朗读…'; go(i+1); }
  else { meta.textContent='本课已讲完 🎉'; }
}
window.addEventListener('click',e=>{ if(e.target===mask) { /* 点遮罩不关闭，需作答 */ } });

/* 初始 */
highlight(0);
meta.textContent='已就绪 · 本课前半段复习「公园20分钟效应」，再讲新课';
